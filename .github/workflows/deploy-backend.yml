name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  deploy-backend:
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Sync frontend dist to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          source: dist/
          target: /var/www/academy-linker/
          strip_components: 1

      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            export XDG_RUNTIME_DIR=/run/user/$(id -u)
            export PATH="$HOME/.local/bin:$PATH"
            cd /home/kscii/academy-linker
            git pull origin main
            cd backend

            # -v 会直接删除所有数据卷, 生产环境需要删除 -v 参数
            podman compose down
            podman compose up -d --build

            # 等待容器中的数据库可用
            # podman wait --condition=healthy academy-linker-postgres

            # 等待 API 容器启动完成（entrypoint 初始化表后才能运行 seed）
            # podman wait --condition=running academy-linker-api

            # 用于初始化测试数据, 正式环境需要删除
            # 在容器内执行，使用内部网络连接 postgres，避免宿主机映射端口不稳定导致 AdminShutdown
            # podman exec academy-linker-api python -m ac_link.db.seed --scenario full-demo --reset --with-auth-tokens

