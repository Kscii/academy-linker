  <!-- Horizontal connector bar -->
  <rect x="31" y="13.5" width="11" height="5" rx="2.5" fill="#C8956A" />

  <!-- Orange gradient circle -->
  <circle cx="53" cy="22" r="17" fill="url(#alOrange)" />

  <!-- White dot on circle -->
