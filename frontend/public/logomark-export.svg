<svg width="175" height="100" viewBox="0 0 70 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="alOrange" cx="40%" cy="38%" r="65%">
      <stop offset="0%"   stop-color="#F7C96A" />
      <stop offset="100%" stop-color="#E8824A" />
    </radialGradient>
    <radialGradient id="alNavy" cx="30%" cy="30%" r="80%">
      <stop offset="0%"   stop-color="#3D4480" />
      <stop offset="100%" stop-color="#252851" />
    </radialGradient>
  </defs>

  <!-- Dark square -->
  <rect x="1" y="1" width="30" height="30" rx="7" fill="url(#alNavy)" />

  <!-- White dot on square -->
