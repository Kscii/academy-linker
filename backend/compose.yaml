services:
  postgres:
    image: docker.io/library/postgres:16
    container_name: academy-linker-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"  # 仅绑定本机，通过 SSH 隧道访问，不暴露到公网
    volumes:
      - academy_linker_pgdata:/var/lib/postgresql/data
      - ./src/ac_link/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - academy_linker_net

  api:
    build:
      context: .
      dockerfile: Containerfile
    container_name: academy-linker-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres  # 容器间通信走内部网络，用服务名覆盖 .env 中的值
      POSTGRES_PORT: 5432      # 容器内部 postgres 固定监听 5432，与宿主机映射端口无关
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - academy_linker_net

networks:
  academy_linker_net:
    name: academy_linker_net

volumes:
  academy_linker_pgdata:
